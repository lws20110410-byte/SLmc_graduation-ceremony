<script>
    (function() {
        'use strict';

        // ======================== 配置 ========================

        /** 校验码（固定） */
        const VALID_CODE = 'BMD-2022_54808cea09a6689526db261713107c58';

        /** 白名单（所有真实姓名） */
        const WHITELIST = [
            '陈全德', '陈筱雅', '陈一帆', '崔淑涵',
            '巩德', '巩茂田', '巩舒琪', '巩伊琳',
            '韩昌丽', '韩佳珍', '韩俊逸', '韩正扬',
            '郇志颐', '郇志影',
            '李王帅', '李修瑞', '李雨晨',
            '刘丕勇', '刘靖瑶', '刘茂威', '刘振',
            '马慧', '马娜', '马文睿', '马新超',
            '毛泽',
            '石兴上',
            '宋笃妍',
            '谭馨玥',
            '王靖箫', '王勤渊', '王瑞平', '王子安', '王紫轩',
            '吴安贝', '吴加豪',
            '郗鲁豫',
            '夏蕊',
            '徐圣志',
            '张明智', '张诗雨', '张雅璇', '张毅', '张梓萱',
            '朱新傲',
            '左俊辉', '左清瑞', 'test_function_reality'
        ];

        /** 建议提交目标（使用 formsubmit.co 中转） */
        const SUGGEST_EMAIL = '1624504824@qq.com'; // ← 请替换为你的真实邮箱

        // ======================== DOM 引用 ========================

        const authPage = document.getElementById('authPage');
        const mainContent = document.getElementById('mainContent');
        const authForm = document.getElementById('authForm');
        const realNameInput = document.getElementById('realName');
        const verifyCodeInput = document.getElementById('verifyCode');
        const authError = document.getElementById('authError');
        const displayName = document.getElementById('displayName');

        const suggestForm = document.getElementById('suggestForm');
        const suggestContent = document.getElementById('suggestContent');
        const suggestFeedback = document.getElementById('suggestFeedback');

        // ======================== 工具函数 ========================

        /** 去首尾空格，中间空格保留 */
        function trimName(str) {
            return str.trim();
        }

        /** 校验姓名是否在白名单中（忽略大小写，但保留原样显示） */
        function isNameValid(inputName) {
            const trimmed = trimName(inputName);
            if (!trimmed) return false;
            return WHITELIST.some(name => name === trimmed);
        }

        /** 获取匹配的白名单姓名（原样返回） */
        function getMatchedName(inputName) {
            const trimmed = trimName(inputName);
            if (!trimmed) return null;
            const found = WHITELIST.find(name => name === trimmed);
            return found || null;
        }

        /** 校验码是否匹配 */
        function isCodeValid(inputCode) {
            return inputCode.trim() === VALID_CODE;
        }

        // ======================== 认证逻辑 ========================

 /** 检查本地存储是否已认证 */
        function checkStoredAuth() {
            try {
                const stored = localStorage.getItem('grad_auth');
                if (!stored) return false;
                const data = JSON.parse(stored);
                if (!data || typeof data !== 'object') return false;
                if (!data.name || typeof data.name !== 'string') return false;
                // 验证姓名仍然在白名单中（防止名单变更后失效）
                if (!isNameValid(data.name)) {
                    localStorage.removeItem('grad_auth');
                    return false;
                }
                return data.name;
            } catch (_) {
                return false;
            }
        }

        /** 执行认证 */
        function performAuth(name, code) {
            const trimmedName = trimName(name);
            const trimmedCode = code.trim();

            // 1. 校验姓名
            if (!trimmedName) {
                authError.textContent = '⚠️ 请填写你的真实姓名';
                authError.className = 'error-msg';
                return false;
            }
            if (!isNameValid(trimmedName)) {
                authError.textContent = '❌ 姓名不在白名单中，请确认输入正确';
                authError.className = 'error-msg';
                return false;
            }

            // 2. 校验码
            if (!trimmedCode) {
                authError.textContent = '⚠️ 请填写校验码';
                authError.className = 'error-msg';
                return false;
            }
            if (!isCodeValid(trimmedCode)) {
                authError.textContent = '❌ 校验码错误，请重新输入';
                authError.className = 'error-msg';
                return false;
            }

            // 3. 全部通过 ✅
            const matchedName = getMatchedName(trimmedName);
            // 保存到本地存储
            try {
                localStorage.setItem('grad_auth', JSON.stringify({ name: matchedName }));
            } catch (_) { /* ignore */ }

            // 显示主界面
            showMainContent(matchedName);
            authError.textContent = '';
            authError.className = 'error-msg';
            return true;
        }

        /** 显示主内容 */
        function showMainContent(name) {
            displayName.textContent = name;
            authPage.style.display = 'none';
            mainContent.style.display = 'block';
            // 清空输入框（安全）
            realNameInput.value = '';
            verifyCodeInput.value = '';
        }

        /** 显示认证页面（登出） */
        function showAuthPage() {
            authPage.style.display = 'block';
            mainContent.style.display = 'none';
            authError.textContent = '';
            authError.className = 'error-msg';
            realNameInput.value = '';
            verifyCodeInput.value = '';
            realNameInput.focus();
            try {
                localStorage.removeItem('grad_auth');
            } catch (_) { /* ignore */ }
        }

        // ======================== 认证表单提交 ========================

        authForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = realNameInput.value;
            const code = verifyCodeInput.value;
            performAuth(name, code);
        });

        // ======================== 建议提交 ========================

        suggestForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const content = suggestContent.value.trim();
            if (!content) {
                suggestFeedback.textContent = '✍️ 请写下你的建议或想说的话';
                suggestFeedback.className = 'error-msg';
                return;
            }

            // 检查邮箱是否被替换
            if (SUGGEST_EMAIL === 'your-email@example.com') {
                suggestFeedback.textContent = '⚠️ 请先配置接收建议的邮箱（见代码顶部 SUGGEST_EMAIL）';
                suggestFeedback.className = 'error-msg';
                return;
            }

            // 禁用按钮防止重复提交
            const btn = suggestForm.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ 提交中…';
            suggestFeedback.textContent = '';
            suggestFeedback.className = 'error-msg';

            // 构造 formsubmit.co 的请求
            const formData = new FormData();
            formData.append('name', displayName.textContent || '匿名同学');
            formData.append('_subject', `🎓 毕业典礼建议 - ${displayName.textContent || '同学'}`);
            formData.append('message', content);
            // 添加一个隐藏的 _captcha 启用验证码（可选）
            formData.append('_captcha', 'false');

            // 使用 fetch 发送到 formsubmit.co
            fetch(`https://formsubmit.co/${SUGGEST_EMAIL}`, {
                    method: 'POST',
                    body: formData,
                })
                .then(response => {
                    if (response.ok) {
                        suggestFeedback.textContent = '✅ 建议已送达！感谢你的分享 💖';
                        suggestFeedback.className = 'error-msg success';
                        suggestContent.value = '';
                    } else {
                        throw new Error('服务器响应异常');
                    }
                })
                .catch(err => {
                    console.error('建议提交失败:', err);
                    suggestFeedback.textContent = '⚠️ 提交失败，请稍后重试或联系管理员';
                    suggestFeedback.className = 'error-msg';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = originalText;
                });
        });

        // ======================== 初始化 ========================

        (function init() {
            // 检查是否已认证
            const storedName = checkStoredAuth();
            if (storedName) {
                showMainContent(storedName);
            } else {
                showAuthPage();
            }

            // 如果建议邮箱未配置，在控制台给出提示
            if (SUGGEST_EMAIL === 'your-email@example.com') {
                console.warn('⚠️ [毕业典礼网站] 请将 SUGGEST_EMAIL 替换为你的真实邮箱，否则建议功能无法正常工作。');
            }
        })();

        // 暴露一个「登出」函数方便调试（非必须）
        window.__logout = showAuthPage;

    })();
</script>

</body>
</html>
